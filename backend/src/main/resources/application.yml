spring:
  application:
    name: unigate-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/unigate_db
    username: unigate_user
    password: unigate_pass_2025
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:your-email@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cache:
    type: simple

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  profiles:
    active: dev

server:
  port: 8081
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:UniGateSuperSecretJwtKeyThatIsAtLeast256BitsLongForHS256Algorithm2025!}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  sla:
    hours: 48

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.unigate: DEBUG
    org.springframework.security: WARN
    org.springframework.statemachine: WARN
